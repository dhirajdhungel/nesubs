<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Nesubs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0A64BC 0%, #084d92 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 24px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #0A64BC;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            background: #0A64BC;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #084d92;
        }

        .status {
            margin-top: 24px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .status.online {
            background: #d4edda;
            color: #155724;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon pulse">
            📡
        </div>
        <h1>You're Offline</h1>
        <p>
            No internet connection detected. Please check your connection and try again.
        </p>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">
            Try Again
        </a>
        <div class="status" id="status">
            Checking connection...
        </div>
    </div>

    <script>
        function checkOnlineStatus() {
            const statusEl = document.getElementById('status');

            if (navigator.onLine) {
                statusEl.textContent = 'Back online! Tap "Try Again" to continue.';
                statusEl.classList.add('online');
            } else {
                statusEl.textContent = 'Still offline. Waiting for connection...';
                statusEl.classList.remove('online');
            }
        }

        // Check status on load
        checkOnlineStatus();

        // Listen for online/offline events
        window.addEventListener('online', checkOnlineStatus);
        window.addEventListener('offline', checkOnlineStatus);

        // Check every 3 seconds
        setInterval(checkOnlineStatus, 3000);
    </script>
</body>

</html>
